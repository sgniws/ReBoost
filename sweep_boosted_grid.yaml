# W&B Sweep config: grid search over lr, lambda_smooth, lambda_boost for Boosted model.
# Fixed: fold=1, epochs=400, HEAD_HIDDEN_CHANNELS=8. Metric: val_dice_et (ET, maximize).
method: grid
metric:
  name: val_dice_et
  goal: maximize
parameters:
  lr:
    values: [0.0001, 0.0005, 0.001]
  lambda_smooth:
    values: [0.25, 0.33, 0.5]
  lambda_boost:
    values: [0.5, 1.0, 1.5]
